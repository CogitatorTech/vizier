name: Create Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  EXTENSION_NAME: vizier
  EXTENSION_API_VERSION: v1.2.0
  ZIG_VERSION: 0.15.2
  DUCKDB_VERSION: v1.5.0
  SUPPORTED_DUCKDB_VERSIONS: v1.2.0,v1.2.1,v1.2.2,v1.3.0,v1.3.1,v1.3.2,v1.4.0,v1.4.1,v1.4.2,v1.4.3,v1.5.0

jobs:
  call-tests:
    uses: ./.github/workflows/tests.yml

  create-release:
    name: Create release draft
    runs-on: ubuntu-latest
    needs: call-tests
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_tag: ${{ steps.release_tag.outputs.release_tag }}
    steps:
      - name: Set release tag
        id: release_tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "release_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=draft-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.release_tag.outputs.release_tag }}
          release_name: Release ${{ steps.release_tag.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          draft: true
          prerelease: false

  build-linux-amd64:
    name: Build Linux AMD64
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build extension
        run: |
          make build-linux-amd64 \
            EXTENSION_NAME=${{ env.EXTENSION_NAME }} \
            EXTENSION_API_VERSION=${{ env.EXTENSION_API_VERSION }}

      - name: Download DuckDB CLI
        run: |
          wget -q https://github.com/duckdb/duckdb/releases/download/${{ env.DUCKDB_VERSION }}/duckdb_cli-linux-amd64.zip
          unzip -q duckdb_cli-linux-amd64.zip
          chmod +x duckdb

      - name: Smoke test
        run: |
          ./duckdb -unsigned -c "
            LOAD 'zig-out/lib/linux_amd64/${{ env.EXTENSION_NAME }}.duckdb_extension';
            SELECT extension_name, loaded, extension_version FROM duckdb_extensions() WHERE extension_name = '${{ env.EXTENSION_NAME }}';
          " > test_output.txt
          cat test_output.txt
          grep -q "${{ env.EXTENSION_NAME }}" test_output.txt && grep -q "true" test_output.txt && echo "Smoke test passed: Extension loaded successfully" || (echo "Smoke test failed" && exit 1)

      - name: Upload repository artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux_amd64
          path: zig-out/lib/linux_amd64/${{ env.EXTENSION_NAME }}.duckdb_extension
          if-no-files-found: error

      - name: Package release asset
        run: |
          zip -j ${{ env.EXTENSION_NAME }}-linux-amd64.zip zig-out/lib/linux_amd64/${{ env.EXTENSION_NAME }}.duckdb_extension

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ env.EXTENSION_NAME }}-linux-amd64.zip
          asset_name: ${{ env.EXTENSION_NAME }}-linux-amd64.zip
          asset_content_type: application/zip

  build-linux-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-24.04-arm64
    needs: create-release
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build extension
        run: |
          make build-linux-arm64 \
            EXTENSION_NAME=${{ env.EXTENSION_NAME }} \
            EXTENSION_API_VERSION=${{ env.EXTENSION_API_VERSION }}

      - name: Download DuckDB CLI
        run: |
          wget -q https://github.com/duckdb/duckdb/releases/download/${{ env.DUCKDB_VERSION }}/duckdb_cli-linux-arm64.zip
          unzip -q duckdb_cli-linux-arm64.zip
          chmod +x duckdb

      - name: Smoke test
        run: |
          ./duckdb -unsigned -c "
            LOAD 'zig-out/lib/linux_arm64/${{ env.EXTENSION_NAME }}.duckdb_extension';
            SELECT extension_name, loaded, extension_version FROM duckdb_extensions() WHERE extension_name = '${{ env.EXTENSION_NAME }}';
          " > test_output.txt
          cat test_output.txt
          grep -q "${{ env.EXTENSION_NAME }}" test_output.txt && grep -q "true" test_output.txt && echo "Smoke test passed: Extension loaded successfully" || (echo "Smoke test failed" && exit 1)

      - name: Upload repository artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux_arm64
          path: zig-out/lib/linux_arm64/${{ env.EXTENSION_NAME }}.duckdb_extension
          if-no-files-found: error

      - name: Package release asset
        run: |
          zip -j ${{ env.EXTENSION_NAME }}-linux-arm64.zip zig-out/lib/linux_arm64/${{ env.EXTENSION_NAME }}.duckdb_extension

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ env.EXTENSION_NAME }}-linux-arm64.zip
          asset_name: ${{ env.EXTENSION_NAME }}-linux-arm64.zip
          asset_content_type: application/zip

  build-linux-amd64-musl:
    name: Build Linux AMD64 (musl)
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build extension
        run: |
          make build-linux-amd64-musl \
            EXTENSION_NAME=${{ env.EXTENSION_NAME }} \
            EXTENSION_API_VERSION=${{ env.EXTENSION_API_VERSION }}

      - name: Verify build artifact
        run: |
          if [ -f "zig-out/lib/linux_amd64_musl/${{ env.EXTENSION_NAME }}.duckdb_extension" ]; then
            echo "Extension built successfully"
            file zig-out/lib/linux_amd64_musl/${{ env.EXTENSION_NAME }}.duckdb_extension
            ls -lh zig-out/lib/linux_amd64_musl/${{ env.EXTENSION_NAME }}.duckdb_extension
          else
            echo "Extension file not found"
            exit 1
          fi

      - name: Upload repository artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux_amd64_musl
          path: zig-out/lib/linux_amd64_musl/${{ env.EXTENSION_NAME }}.duckdb_extension
          if-no-files-found: error

      - name: Package release asset
        run: |
          zip -j ${{ env.EXTENSION_NAME }}-linux-amd64-musl.zip zig-out/lib/linux_amd64_musl/${{ env.EXTENSION_NAME }}.duckdb_extension

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ env.EXTENSION_NAME }}-linux-amd64-musl.zip
          asset_name: ${{ env.EXTENSION_NAME }}-linux-amd64-musl.zip
          asset_content_type: application/zip

  build-linux-arm64-musl:
    name: Build Linux ARM64 (musl)
    runs-on: ubuntu-24.04-arm64
    needs: create-release
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build extension
        run: |
          make build-linux-arm64-musl \
            EXTENSION_NAME=${{ env.EXTENSION_NAME }} \
            EXTENSION_API_VERSION=${{ env.EXTENSION_API_VERSION }}

      - name: Verify build artifact
        run: |
          if [ -f "zig-out/lib/linux_arm64_musl/${{ env.EXTENSION_NAME }}.duckdb_extension" ]; then
            echo "Extension built successfully"
            file zig-out/lib/linux_arm64_musl/${{ env.EXTENSION_NAME }}.duckdb_extension
            ls -lh zig-out/lib/linux_arm64_musl/${{ env.EXTENSION_NAME }}.duckdb_extension
          else
            echo "Extension file not found"
            exit 1
          fi

      - name: Upload repository artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux_arm64_musl
          path: zig-out/lib/linux_arm64_musl/${{ env.EXTENSION_NAME }}.duckdb_extension
          if-no-files-found: error

      - name: Package release asset
        run: |
          zip -j ${{ env.EXTENSION_NAME }}-linux-arm64-musl.zip zig-out/lib/linux_arm64_musl/${{ env.EXTENSION_NAME }}.duckdb_extension

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ env.EXTENSION_NAME }}-linux-arm64-musl.zip
          asset_name: ${{ env.EXTENSION_NAME }}-linux-arm64-musl.zip
          asset_content_type: application/zip

  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-14
    needs: create-release
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build extension
        run: |
          make build-macos-arm64 \
            EXTENSION_NAME=${{ env.EXTENSION_NAME }} \
            EXTENSION_API_VERSION=${{ env.EXTENSION_API_VERSION }}

      - name: Download DuckDB CLI
        run: |
          wget -q https://github.com/duckdb/duckdb/releases/download/${{ env.DUCKDB_VERSION }}/duckdb_cli-osx-universal.zip
          unzip -q duckdb_cli-osx-universal.zip
          chmod +x duckdb

      - name: Smoke test
        run: |
          ./duckdb -unsigned -c "
            LOAD 'zig-out/lib/osx_arm64/${{ env.EXTENSION_NAME }}.duckdb_extension';
            SELECT extension_name, loaded, extension_version FROM duckdb_extensions() WHERE extension_name = '${{ env.EXTENSION_NAME }}';
          " > test_output.txt
          cat test_output.txt
          grep -q "${{ env.EXTENSION_NAME }}" test_output.txt && grep -q "true" test_output.txt && echo "Smoke test passed: Extension loaded successfully" || (echo "Smoke test failed" && exit 1)

      - name: Upload repository artifact
        uses: actions/upload-artifact@v4
        with:
          name: osx_arm64
          path: zig-out/lib/osx_arm64/${{ env.EXTENSION_NAME }}.duckdb_extension
          if-no-files-found: error

      - name: Package release asset
        run: |
          zip -j ${{ env.EXTENSION_NAME }}-macos-arm64.zip zig-out/lib/osx_arm64/${{ env.EXTENSION_NAME }}.duckdb_extension

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ env.EXTENSION_NAME }}-macos-arm64.zip
          asset_name: ${{ env.EXTENSION_NAME }}-macos-arm64.zip
          asset_content_type: application/zip

  build-windows-amd64:
    name: Build Windows AMD64
    runs-on: windows-latest
    needs: create-release
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build extension
        shell: bash
        run: |
          make build-windows-amd64 \
            EXTENSION_NAME=${{ env.EXTENSION_NAME }} \
            EXTENSION_API_VERSION=${{ env.EXTENSION_API_VERSION }}

      - name: Download DuckDB CLI
        shell: bash
        run: |
          curl -L -o duckdb_cli-windows-amd64.zip https://github.com/duckdb/duckdb/releases/download/${{ env.DUCKDB_VERSION }}/duckdb_cli-windows-amd64.zip
          unzip -q duckdb_cli-windows-amd64.zip

      - name: Smoke test
        shell: bash
        run: |
          ./duckdb.exe -unsigned -c "
            LOAD 'zig-out/lib/windows_amd64/${{ env.EXTENSION_NAME }}.duckdb_extension';
            SELECT extension_name, loaded, extension_version FROM duckdb_extensions() WHERE extension_name = '${{ env.EXTENSION_NAME }}';
          " > test_output.txt
          cat test_output.txt
          grep -q "${{ env.EXTENSION_NAME }}" test_output.txt && grep -q "true" test_output.txt && echo "Smoke test passed: Extension loaded successfully" || (echo "Smoke test failed" && exit 1)

      - name: Upload repository artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows_amd64
          path: zig-out/lib/windows_amd64/${{ env.EXTENSION_NAME }}.duckdb_extension
          if-no-files-found: error

      - name: Package release asset
        shell: pwsh
        run: |
          Compress-Archive -Path "zig-out\lib\windows_amd64\${{ env.EXTENSION_NAME }}.duckdb_extension" -DestinationPath "${{ env.EXTENSION_NAME }}-windows-amd64.zip" -Force

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ env.EXTENSION_NAME }}-windows-amd64.zip
          asset_name: ${{ env.EXTENSION_NAME }}-windows-amd64.zip
          asset_content_type: application/zip

  build-windows-arm64:
    name: Build Windows ARM64
    runs-on: windows-latest
    needs: create-release
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build extension
        shell: bash
        run: |
          make build-windows-arm64 \
            EXTENSION_NAME=${{ env.EXTENSION_NAME }} \
            EXTENSION_API_VERSION=${{ env.EXTENSION_API_VERSION }}

      - name: Verify build artifact
        shell: bash
        run: |
          if [ -f "zig-out/lib/windows_arm64/${{ env.EXTENSION_NAME }}.duckdb_extension" ]; then
            echo "Extension built successfully for Windows ARM64"
            file zig-out/lib/windows_arm64/${{ env.EXTENSION_NAME }}.duckdb_extension || echo "file command not available"
            ls -lh zig-out/lib/windows_arm64/${{ env.EXTENSION_NAME }}.duckdb_extension
          else
            echo "Extension file not found"
            exit 1
          fi

      - name: Upload repository artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows_arm64
          path: zig-out/lib/windows_arm64/${{ env.EXTENSION_NAME }}.duckdb_extension
          if-no-files-found: error

      - name: Package release asset
        shell: pwsh
        run: |
          Compress-Archive -Path "zig-out\lib\windows_arm64\${{ env.EXTENSION_NAME }}.duckdb_extension" -DestinationPath "${{ env.EXTENSION_NAME }}-windows-arm64.zip" -Force

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ env.EXTENSION_NAME }}-windows-arm64.zip
          asset_name: ${{ env.EXTENSION_NAME }}-windows-arm64.zip
          asset_content_type: application/zip

  build-freebsd-amd64:
    name: Build FreeBSD AMD64 (cross-compile)
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build extension
        run: |
          make build-freebsd-amd64 \
            EXTENSION_NAME=${{ env.EXTENSION_NAME }} \
            EXTENSION_API_VERSION=${{ env.EXTENSION_API_VERSION }}

      - name: Verify build artifact
        run: |
          if [ -f "zig-out/lib/freebsd_amd64/${{ env.EXTENSION_NAME }}.duckdb_extension" ]; then
            echo "Extension built successfully for FreeBSD AMD64"
            file zig-out/lib/freebsd_amd64/${{ env.EXTENSION_NAME }}.duckdb_extension
            ls -lh zig-out/lib/freebsd_amd64/${{ env.EXTENSION_NAME }}.duckdb_extension
          else
            echo "Extension file not found"
            exit 1
          fi

      - name: Upload repository artifact
        uses: actions/upload-artifact@v4
        with:
          name: freebsd_amd64
          path: zig-out/lib/freebsd_amd64/${{ env.EXTENSION_NAME }}.duckdb_extension
          if-no-files-found: error

      - name: Package release asset
        run: |
          zip -j ${{ env.EXTENSION_NAME }}-freebsd-amd64.zip zig-out/lib/freebsd_amd64/${{ env.EXTENSION_NAME }}.duckdb_extension

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ env.EXTENSION_NAME }}-freebsd-amd64.zip
          asset_name: ${{ env.EXTENSION_NAME }}-freebsd-amd64.zip
          asset_content_type: application/zip

  deploy-pages:
    name: Deploy docs and extension repository
    runs-on: ubuntu-latest
    needs:
      - build-linux-amd64
      - build-linux-arm64
      - build-linux-amd64-musl
      - build-linux-arm64-musl
      - build-macos-arm64
      - build-windows-amd64
      - build-windows-arm64
      - build-freebsd-amd64
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync

      - name: Build documentation site
        run: |
          source .venv/bin/activate
          make docs

      - name: Download repository artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage extension repository
        run: |
          python scripts/stage_extension_repository.py \
            --artifacts-root artifacts \
            --site-root site \
            --extension-name ${{ env.EXTENSION_NAME }} \
            --duckdb-versions ${{ env.SUPPORTED_DUCKDB_VERSIONS }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "docs: Deploy site and extension repository from ${{ github.sha }}"
