            echo "Extension built successfully for FreeBSD AMD64"
            file zig-out/lib/freebsd_amd64/${{ env.EXTENSION_NAME }}.duckdb_extension
            ls -lh zig-out/lib/freebsd_amd64/${{ env.EXTENSION_NAME }}.duckdb_extension
          else
            echo "Extension file not found"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-freebsd-amd64
          path: zig-out/lib/freebsd_amd64/${{ env.EXTENSION_NAME }}.duckdb_extension
          if-no-files-found: error

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs:
      - build-linux-amd64
      - build-linux-arm64
      - build-linux-amd64-musl
      - build-linux-arm64-musl
      - build-macos-amd64
      - build-macos-arm64
      - build-windows-amd64
      - build-windows-arm64
      - build-freebsd-amd64
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts built:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for dir in artifacts/*/; do
            platform=$(basename "$dir")
            echo "- **${platform}**" >> $GITHUB_STEP_SUMMARY
            ls -lh "$dir" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Extension Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Extension API Version:** ${{ env.EXTENSION_API_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Zig Version:** ${{ env.ZIG_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **DuckDB Version (tested):** ${{ env.DUCKDB_VERSION }}" >> $GITHUB_STEP_SUMMARY
