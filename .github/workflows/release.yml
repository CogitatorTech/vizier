  build-linux-amd64-musl:
    name: Build Linux AMD64 (musl)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build extension
        run: |
          make build-linux-amd64-musl \
            EXTENSION_NAME=${{ env.EXTENSION_NAME }} \
            EXTENSION_API_VERSION=${{ env.EXTENSION_API_VERSION }} \


      - name: Verify build artifact
        run: |
          if [ -f "zig-out/lib/linux_amd64_musl/${{ env.EXTENSION_NAME }}.duckdb_extension" ]; then
            echo "Extension built successfully"
            file zig-out/lib/linux_amd64_musl/${{ env.EXTENSION_NAME }}.duckdb_extension
            ls -lh zig-out/lib/linux_amd64_musl/${{ env.EXTENSION_NAME }}.duckdb_extension
