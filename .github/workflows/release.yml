name: Make Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  EXTENSION_NAME: vizier
  EXTENSION_API_VERSION: v1.2.0
  ZIG_VERSION: 0.15.2
  DUCKDB_VERSION: v1.5.0

jobs:
  build-linux-amd64:
    name: Build Linux AMD64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build extension
        run: |
          make build-linux-amd64 \
            EXTENSION_NAME=${{ env.EXTENSION_NAME }} \
            EXTENSION_API_VERSION=${{ env.EXTENSION_API_VERSION }} \


      - name: Download DuckDB CLI
        run: |
          wget -q https://github.com/duckdb/duckdb/releases/download/${{ env.DUCKDB_VERSION }}/duckdb_cli-linux-amd64.zip
          unzip -q duckdb_cli-linux-amd64.zip
          chmod +x duckdb

      - name: Smoke test
        run: |
          ./duckdb -unsigned -c "
            LOAD 'zig-out/lib/linux_amd64/${{ env.EXTENSION_NAME }}.duckdb_extension';
            SELECT extension_name, loaded, extension_version FROM duckdb_extensions() WHERE extension_name = '${{ env.EXTENSION_NAME }}';
          " > test_output.txt
          cat test_output.txt
          grep -q "${{ env.EXTENSION_NAME }}" test_output.txt && grep -q "true" test_output.txt && echo "Smoke test passed: Extension loaded successfully" || (echo "Smoke test failed" && exit 1)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-linux-amd64
          path: zig-out/lib/linux_amd64/${{ env.EXTENSION_NAME }}.duckdb_extension
          if-no-files-found: error

  build-linux-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-24.04-arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
