site_name: Vizier Documentation
site_description: A database advisor and finetuner for DuckDB
repo_url: https://github.com/CogitatorTech/vizier
repo_name: CogitatorTech/vizier
site_url: https://cogitatortech.github.io/vizier/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.top
    - content.code.select
    - content.code.annotate
    - navigation.tracking

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/CogitatorTech/vizier

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Examples: examples.md
  - API Reference: api-reference.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - admonition
  - attr_list
  - toc:
      permalink: true
